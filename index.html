    function getVoice() {
      const voices = speechSynthesis.getVoices();
      return voices.find(v => v.lang && v.lang.toLowerCase().startsWith("id")) ||
             voices.find(v => v.lang && v.lang.toLowerCase().startsWith("ms")) ||
             voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
    }

    function speak(text, rate = 0.9) {
      if (!("speechSynthesis" in window)) {
        alert("이 브라우저는 음성 재생을 지원하지 않습니다.");
        return;
      }
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      const voice = getVoice();
      if (voice) utter.voice = voice;
      utter.lang = voice?.lang || "id-ID";
      utter.rate = rate;
      utter.pitch = 1;
      speechSynthesis.speak(utter);
    }

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {};
      window.addEventListener("load", () => {
        speechSynthesis.getVoices();
      });
    }

          <div class="btns">
            <button class="play-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.9)">🔊 전체 듣기</button>
            <button class="slow-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.65)">🐢 천천히</button>
          </div>
        </div>
      `).join("");
    }

    function createSplitCards(data, targetId) {
      const target = document.getElementById(targetId);
      target.innerHTML = data.map(item => `
        <div class="card">
          <div class="badge">${item.badge}</div>
          <div class="indo">${item.indo}</div>
          <div class="line"><span class="label">한글 발음</span>${item.koPron}</div>
          <div class="line"><span class="label">中文发音</span>${item.zhPron}</div>
          <div class="line"><span class="label">뜻</span>${item.meaning}</div>
          <div class="btns">
            <button class="play-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.9)">🔊 전체 듣기</button>
            <button class="slow-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.65)">🐢 천천히</button>
          </div>
          <div class="split-wrap">
            <div class="split-title">끊어 듣기</div>
            ${item.parts.map(part => `
              <div class="split-item">
                <div class="split-label">${part.label}</div>
                <button class="slow-btn" onclick="speak('${part.text.replace(/'/g, "\\'")}', 0.75)">🔊 ${part.text}</button>
              </div>
            `).join("")}
          </div>
        </div>
      `).join("");
    }

    function createRolePlay(data, targetId) {
      const target = document.getElementById(targetId);
      target.innerHTML = `
        <div class="role-title">말하는 순서대로 따라해보세요</div>
        ${data.map(item => `
          <div class="dialog-line">
            <div class="speaker">${item.speaker}</div>
            <div class="indo">${item.indo}</div>
            <div class="line"><span class="label">한글 발음</span>${item.koPron}</div>
            <div class="line"><span class="label">中文发音</span>${item.zhPron}</div>
            <div class="line"><span class="label">뜻</span>${item.meaning}</div>
            <div class="btns">
              <button class="play-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.9)">🔊 듣기</button>
              <button class="slow-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.65)">🐢 천천히</button>
            </div>
          </div>
        `).join("")}
      `;
    }

    createNormalCards(reviewWords, "wordGrid");
    createNormalCards(reviewSentences, "sentenceGrid");
    createSplitCards(splitPractice, "splitGrid");
    createRolePlay(rolePlay1, "rolePlay1");
    createRolePlay(rolePlay2, "rolePlay2");
    createRolePlay(rolePlay3, "rolePlay3");

    const quizData = [
      {
        question: "acara 뜻은 무엇일까요?",
        options: ["행사", "가족", "장소"],
        answer: "행사"
      },
      {
        question: "Boleh datang dengan keluarga 뜻은 무엇일까요?",
        options: ["가족과 함께 오셔도 돼요", "가족이 어디에 있나요", "가족은 교회에 있어요"],
        answer: "가족과 함께 오셔도 돼요"
      },
      {
        question: "Tempatnya di sini 뜻은 무엇일까요?",
        options: ["시간은 여기예요", "장소는 여기예요", "친구는 여기예요"],
        answer: "장소는 여기예요"
      },
      {
        question: "Mari ikut 뜻은 무엇일까요?",
        options: ["같이 먹어요", "함께 참여해요", "집에 가요"],
        answer: "함께 참여해요"
      },
      {
        question: "dekat 뜻은 무엇일까요?",
        options: ["멀다", "가깝다", "늦다"],
        answer: "가깝다"
      },
      {
        question: "Gereja kami di Pluit, dekat Emporium 뜻은 무엇일까요?",
        options: ["우리 교회는 Pluit에 있고 Emporium 근처예요", "우리 교회는 한국에 있어요", "우리 교회는 오후에 시작해요"],
        answer: "우리 교회는 Pluit에 있고 Emporium 근처예요"
      }
    ];

    let current = 0;
    let score = 0;

    const questionBox = document.getElementById("questionBox");
    const answersBox = document.getElementById("answersBox");
    const resultBox = document.getElementById("resultBox");
    const nextArea = document.getElementById("nextArea");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");

    function updateProgress() {
      progressText.textContent = `${Math.min(current + 1, quizData.length)} / ${quizData.length}`;
      progressFill.style.width = `${(current / quizData.length) * 100}%`;
    }

    function renderQuiz() {
      if (current >= quizData.length) {
        progressText.textContent = "완료";
        progressFill.style.width = "100%";
        questionBox.textContent = `퀴즈 끝! 점수는 ${score} / ${quizData.length}`;
        answersBox.innerHTML = "";
        resultBox.textContent = score === quizData.length ? "정말 잘했어요! 🎉" : "좋아요. 다시 하면 더 잘할 수 있어요!";
        nextArea.innerHTML = `<button class="restart-btn" onclick="restartQuiz()">다시 하기</button>`;
        return;
      }

      updateProgress();
      const q = quizData[current];
      questionBox.textContent = q.question;
      resultBox.textContent = "";
      nextArea.innerHTML = "";

      answersBox.innerHTML = q.options.map(opt => `
        <button class="answer-btn" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>
      `).join("");
    }

    function checkAnswer(button, selected) {
      const q = quizData[current];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => btn.disabled = true);
      buttons.forEach(btn => {
        if (btn.textContent === q.answer) {
          btn.classList.add("correct");
        }
      });

      if (selected === q.answer) {
        score++;
        resultBox.textContent = "정답입니다!";
        button.classList.add("correct");
      } else {
        resultBox.textContent = `아쉬워요. 정답은 "${q.answer}" 입니다.`;
        button.classList.add("wrong");
      }

      nextArea.innerHTML = `<button class="next-btn" onclick="nextQuestion()">${current === quizData.length - 1 ? "결과 보기" : "다음 문제"}</button>`;
      progressFill.style.width = `${((current + 1) / quizData.length) * 100}%`;
    }

    function nextQuestion() {
      current++;
      renderQuiz();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      renderQuiz();
    }

    renderQuiz();
  </script>
</body>
</html>
